<mat-card>
  <h2>Airtable Data Viewer</h2>
  <p>View all synced Bases, Tables, and Records.</p>

  <button
    mat-raised-button
    color="primary"
    (click)="fetchAll()"
    [disabled]="loading"
  >
    <mat-icon>refresh</mat-icon>
    {{ loading ? "Fetching..." : "Refresh Data" }}
  </button>

  <div *ngIf="errorMsg" class="error">{{ errorMsg }}</div>

  <mat-tab-group
    [selectedIndex]="getTabIndex(activeTab)"
    (selectedIndexChange)="onTabChange($event)"
  >
    <mat-tab label="Bases" (click)="setTab('bases')">
      <mat-icon matPrefix>dns</mat-icon>
      <div class="grid-wrapper" *ngIf="!loading">
        <ag-grid-angular
          style="width: 100%; height: 550px"
          class="ag-theme-alpine"
          [rowData]="bases"
          [columnDefs]="baseCols"
          [defaultColDef]="{
            resizable: true,
            sortable: true,
            filter: true,
            flex: 1
          }"
          [pagination]="true"
          [paginationPageSize]="20"
        >
        </ag-grid-angular>
      </div>
    </mat-tab>

    <mat-tab label="Tables" (click)="setTab('tables')">
      <mat-icon matPrefix>table_chart</mat-icon>
      <div class="grid-wrapper" *ngIf="!loading">
        <ag-grid-angular
          style="width: 100%; height: 550px"
          class="ag-theme-alpine"
          [rowData]="tables"
          [columnDefs]="tableCols"
          [defaultColDef]="{
            resizable: true,
            sortable: true,
            filter: true,
            flex: 1
          }"
          [pagination]="true"
          [paginationPageSize]="20"
        >
        </ag-grid-angular>
      </div>
    </mat-tab>

    <mat-tab label="Records" (click)="setTab('records')">
      <mat-icon matPrefix>receipt_long</mat-icon>
      <div class="grid-wrapper" *ngIf="!loading">
        <ag-grid-angular
          style="width: 100%; height: 550px"
          class="ag-theme-alpine"
          [rowData]="records"
          [columnDefs]="recordCols"
          [defaultColDef]="{
            resizable: true,
            sortable: true,
            filter: true,
            flex: 1
          }"
          [pagination]="true"
          [paginationPageSize]="20"
        >
        </ag-grid-angular>
      </div>
    </mat-tab>

    <mat-tab label="Users" (click)="setTab('users')">
      <mat-icon matPrefix>group</mat-icon>
      <div class="grid-wrapper" *ngIf="!loading">
        <ag-grid-angular
          style="width: 100%; height: 550px"
          class="ag-theme-alpine"
          [rowData]="users"
          [columnDefs]="userCols"
          [defaultColDef]="{
            resizable: true,
            sortable: true,
            filter: true,
            flex: 1
          }"
          [pagination]="true"
          [paginationPageSize]="20"
        >
        </ag-grid-angular>
      </div>
    </mat-tab>
  </mat-tab-group>
  <div class="spinner-container" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
</mat-card>
