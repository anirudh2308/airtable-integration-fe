<mat-card class="scraper-card">
  <h2>Airtable Scraper</h2>
  <p>{{ message }}</p>

  <div *ngIf="!loggedIn" class="mfa-section">
    <mat-form-field>
      <mat-label>MFA Code</mat-label>
      <input matInput [(ngModel)]="mfaCode" placeholder="Enter MFA code" />
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="login()">Login</button>
  </div>

  <div *ngIf="loggedIn && !running">
    <button
      mat-raised-button
      color="accent"
      (click)="runScraper()"
      *ngIf="!hasPreviousData"
    >
      Run Scraper
    </button>
    <button
      mat-raised-button
      color="warn"
      (click)="reRunScraper()"
      *ngIf="hasPreviousData"
    >
      Re-run Scraper
    </button>
  </div>

  <div *ngIf="running" class="spinner">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Scraping... please wait.</p>
  </div>

  <div *ngIf="finished && hasPreviousData" class="table-container">
    <h3>Scraper Results ({{ resultsCount }})</h3>
    <ag-grid-angular
      style="width: 100%; height: 600px"
      class="ag-theme-alpine"
      [columnDefs]="colDefs"
      [rowData]="rowData"
      [pagination]="true"
      [paginationPageSize]="10"
    ></ag-grid-angular>
  </div>
</mat-card>
