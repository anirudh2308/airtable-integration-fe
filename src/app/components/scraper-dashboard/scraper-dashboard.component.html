<mat-card class="scraper-card">
  <h2><mat-icon color="accent">sync</mat-icon> Airtable Scraper</h2>
  <p>{{ message }}</p>

  <div *ngIf="!loggedIn" class="mfa-section">
    <mat-form-field>
      <mat-label>MFA Code</mat-label>
      <input matInput [(ngModel)]="mfaCode" placeholder="Enter MFA code" />
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="login()">
      <mat-icon>login</mat-icon>
      Login
    </button>
  </div>

  <div *ngIf="loggedIn && !running">
    <button
      mat-raised-button
      color="accent"
      (click)="runScraper()"
      *ngIf="!hasPreviousData"
    >
      <mat-icon>play_arrow</mat-icon>
      Run Scraper
    </button>
    <button
      mat-raised-button
      color="warn"
      (click)="reRunScraper()"
      *ngIf="hasPreviousData"
    >
      <mat-icon>replay</mat-icon>
      Re-run Scraper
    </button>
  </div>

  <div *ngIf="running" class="spinner">
    <mat-spinner diameter="40"></mat-spinner>
    <p><mat-icon color="accent">hourglass_bottom</mat-icon> Scraping...</p>
  </div>

  <div *ngIf="finished && hasPreviousData" class="table-container">
    <h3>
      <mat-icon color="primary">check_circle</mat-icon>Scraper Results ({{
        resultsCount
      }})
    </h3>
    <ag-grid-angular
      style="width: 100%; height: 600px"
      class="ag-theme-alpine"
      [columnDefs]="colDefs"
      [rowData]="rowData"
      [pagination]="true"
      [paginationPageSize]="10"
    ></ag-grid-angular>
  </div>
</mat-card>
