<mat-card>
  <h2>Custom Airtable Scraper</h2>

  <div *ngIf="!success">
    <mat-form-field appearance="outline" class="mfa-field">
      <mat-label>MFA Code</mat-label>
      <input matInput [(ngModel)]="mfaCode" />
    </mat-form-field>

    <div class="actions">
      <button
        mat-raised-button
        color="primary"
        (click)="login()"
        [disabled]="loading"
      >
        {{ loading ? "Logging in..." : "Login & Save Cookies" }}
      </button>

      <button
        mat-raised-button
        color="accent"
        (click)="runScraper()"
        [disabled]="scraping"
      >
        {{ scraping ? "Scraping..." : "Run Scraper" }}
      </button>
    </div>
  </div>

  <div class="log-section">
    <h3>Logs</h3>
    <div class="log-box">
      <div *ngFor="let line of logs">{{ line }}</div>
    </div>
  </div>

  <div *ngIf="success" class="success-box">
    <h3>✅ All records scraped successfully!</h3>
  </div>
</mat-card>
